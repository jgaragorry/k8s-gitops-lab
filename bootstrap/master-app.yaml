apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: platform-bootstrap
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/jgaragorry/k8s-gitops-lab.git
    targetRevision: HEAD
    path: workloads/core/core
  destination:
    server: https://kubernetes.default.svc
    namespace: dev-web
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
    - CreateNamespace=true
