apiVersion: apps/v1
kind: Deployment
metadata:
  name: my-backend-api
  namespace: dev-web
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
      - name: api
        image: nginx:alpine
---
apiVersion: v1
kind: Service
metadata:
  name: backend-service
  namespace: dev-web
spec:
  selector:
    app: backend
  ports:
    - port: 8080
      targetPort: 80
